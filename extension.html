<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Twigwind Installation</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&amp;family=JetBrains+Mono:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet"/>
<link href="/logo.png" rel="icon" type="image/x-icon"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- Docs Styles -->
<link href="static/docs.css" rel="stylesheet"/>
<script>hljs.highlightAll();</script>
</head>
    <body>
        <aside class="sidebar">
        <h2>Twigwind Docs</h2>
        <nav>{{ nav | safe }}</nav>
    </aside>
    <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
    <main class="main">

    </main>
    <script>
    const toggleBtn = document.getElementById('sidebar-toggle');
    const sidebar = document.querySelector('.sidebar');
    const body = document.body;

    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent body click from immediately closing
      sidebar.classList.toggle('show');
      body.classList.toggle('sidebar-open');
    });

    // Close sidebar if clicking outside
    body.addEventListener('click', (e) => {
      if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target) && sidebar.classList.contains('show')) {
        sidebar.classList.remove('show');
        body.classList.remove('sidebar-open');
      }
    });
    </script>
    </body>
</html>
